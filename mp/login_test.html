<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生管理系统登录测试</title>
    <script
        src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"
    ></script>

    <script>
        const baseUrl = "http://localhost:8081";

        function showResult(data){
            document.getElementById("result").innerText = JSON.stringify(data,null,2)
        }

        // 登录
        function login(){
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;

            axios.post(baseUrl + "/login",{
                username: username,
                password: password
            }).then(res =>{
                showResult(res.data);

                if(res.data.code === 200 && res.data.data && res.data.data.token){
                    localStorage.setItem("token",res.data.data.token);

                    alert("登录成功。token已保存");
                }     
            }).catch(err =>{
                showResult(err.response ? err.response.data : err.message);
            });
        }

        function getStudentList() {
            const token = localStorage.getItem("token");
            console.log(token);
            axios.get(baseUrl + "/student/list",{
                headers: {
                    token: token
                }
            }).then(res =>{
                showResult(res.data);
            }).catch(err =>{
                showResult(err.response ? err.response : err.message);
            });
        }

        function logOut(){
            const token = localStorage.getItem("token");

            axios.post(baseUrl + "/logOut",{
                headers: {
                    token: token
                }
            }).then(res =>{
                showResult(res.data);
                localStorage.removeItem("token");
                alert("退出登录成功，token删除");
            }).catch(err =>{
                showResult(res.response ? res.response : res.message);
            })
        }

    </script>
</head>
<body>
    <h2>学生管理系统登录测试</h2>
    
    <div>
        <label>用户名</label>
        <input id="username" value="admin">
    </div>

    <div>
        <label>密码</label>
        <input id="password" value="admin" type="password">
    </div>

    <br>

    <button onclick="login()">登录</button>
    <button onclick="getStudentList()">获取学生列表</button>
    <button onclick="logOut()">退出登录</button>

    <h3>接口返回结果</h3>
    <!-- <pre>标签：浏览器会保留文本的空格和换行符 -->
    <pre id="result"></pre>
</body>
</html>
